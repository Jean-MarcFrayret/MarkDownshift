name: Bug report
description: Report something that is not working correctly
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve MarkDownshift. Please remove private document content before attaching screenshots.
  - type: input
    id: version
    attributes:
      label: MarkDownshift version
      placeholder: "1.2"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac type
      placeholder: "macOS 26.5, Apple Silicon Mac mini"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
